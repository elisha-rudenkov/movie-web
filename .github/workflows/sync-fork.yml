name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Tell this dumbass who you are
        run: |
          git config user.email "gut-actions@elisharudenkov.com"
          git config user.name "GitHub Actions"

      - name: Sync Fork
        run: |
          git remote add upstream https://github.com/sussy-code/smov.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories --no-commit
          if [ $? -ne 0 ]; then
            echo "Merge conflict detected. Resolving..."
            git checkout --ours public/config.js
            git add public/config.js
            git commit -m "Resolve merge conflict in public/config.js"
          fi
          git reset -- .github/workflows/
          git checkout -- .github/workflows/
          git commit -m "Sync fork with upstream, excluding workflows"
          git push origin main
